<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A1616HD — Serial 라우팅</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f1419; color: #e6edf3; }
    body { max-width: 56rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    h2 { font-size: 1rem; margin-top: 2rem; font-weight: 600; color: #8b949e; }
    label { display: block; margin-top: 0.75rem; font-size: 0.85rem; color: #8b949e; }
    input, button { font: inherit; }
    input {
      width: 100%; max-width: 20rem; padding: 0.45rem 0.6rem;
      border: 1px solid #30363d; border-radius: 6px; background: #161b22; color: inherit;
      box-sizing: border-box;
    }
    button {
      margin-top: 1rem; margin-right: 0.5rem; padding: 0.5rem 1rem; border: none; border-radius: 6px;
      background: #238636; color: #fff; cursor: pointer;
    }
    button.secondary { background: #21262d; border: 1px solid #30363d; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.5rem; }
    .row label { margin-top: 0; }
    .out {
      margin-top: 1rem; padding: 1rem; border-radius: 8px;
      background: #161b22; border: 1px solid #30363d; white-space: pre-wrap;
      font-size: 0.85rem; max-height: 14rem; overflow: auto;
    }
    .ok { color: #3fb950; }
    .err { color: #f85149; }
    .meta { font-size: 0.8rem; color: #8b949e; margin-top: 0.5rem; }
    table {
      width: 100%; border-collapse: collapse; font-size: 0.9rem;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
    }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #30363d; }
    th { background: #21262d; color: #8b949e; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <h1>A1616HD 매트릭스</h1>

  <h2>Serial 설정</h2>
  <p class="meta">
    <strong>연결 테스트</strong>는 <code>probe_command</code>(기본 <code>.</code>) 한 번 보내고 응답으로 Serial 연결을 확인합니다.
    라우팅은 <code>{input}X{output}.</code> 형식입니다.
  </p>

  <label>COM 포트</label>
  <input id="port" type="text" placeholder="COM3" autocomplete="off" />

  <div class="row">
    <div>
      <label>Baudrate</label>
      <input id="baud" type="number" min="300" step="1" />
    </div>
    <div>
      <label>Data bits</label>
      <input id="bytesize" type="number" min="7" max="8" />
    </div>
    <div>
      <label>Parity (N/E/O)</label>
      <input id="parity" type="text" maxlength="1" />
    </div>
    <div>
      <label>Stop bits</label>
      <input id="stopbits" type="number" min="1" max="2" />
    </div>
    <div>
      <label>Timeout (초)</label>
      <input id="timeout" type="number" min="0.1" step="0.1" />
    </div>
  </div>

  <button id="save" type="button" class="secondary">설정 저장</button>
  <button id="connTest" type="button">연결 테스트</button>

  <div id="status" class="meta"></div>
  <div id="out" class="out" aria-live="polite"></div>

  <h2>수동 라우팅</h2>
  <p class="meta">
    장비에서 확인된 형식: <code id="routeTemplate">—</code> (플레이스홀더 <code>input</code>, <code>output</code>)
  </p>
  <div class="row">
    <div>
      <label>Input (1–16)</label>
      <input id="routeIn" type="number" min="1" max="16" step="1" value="1" />
    </div>
    <div>
      <label>Output (1–16)</label>
      <input id="routeOut" type="number" min="1" max="16" step="1" value="1" />
    </div>
  </div>
  <button id="routeSend" type="button">전송 (Serial)</button>
  <p class="meta" style="margin-top:1rem;">테스트</p>
  <button id="preset12" type="button" class="secondary">1→2 <code>(1X2.)</code></button>
  <button id="preset22" type="button" class="secondary">2→2 <code>(2X2.)</code></button>
  <div id="routeSendMsg" class="meta"></div>

  <h2>라우팅 상태 (Output → Input)</h2>
  <p class="meta">아래 표는 <strong>수동 라우팅 전송 성공 시</strong> 저장된 값입니다. 장비에서 별도 상태 조회를 하지 않습니다.</p>
  <p class="meta" id="routeMeta">마지막 조회: —</p>

  <table id="routeTable" aria-label="라우팅 조회">
    <thead>
      <tr><th>출력</th><th>연결된 입력</th></tr>
    </thead>
    <tbody id="routeBody"></tbody>
  </table>
  <div id="routeErr" class="meta"></div>
  <details style="margin-top:1rem;">
    <summary class="meta" style="cursor:pointer;">마지막 조회 raw 일부</summary>
    <div id="rawPreview" class="out" style="max-height:8rem;"></div>
  </details>
  <script>
    const $ = (id) => document.getElementById(id);

    async function loadSettings() {
      const r = await fetch("/api/settings");
      const j = await r.json();
      const s = j.serial;
      $("port").value = s.port;
      $("baud").value = s.baudrate;
      $("bytesize").value = s.bytesize;
      $("parity").value = s.parity;
      $("stopbits").value = s.stopbits;
      $("timeout").value = s.timeout;
      if (j.protocol && $("routeTemplate")) {
        $("routeTemplate").textContent = j.protocol.route_template || "{input}X{output}.";
      }
    }

    async function saveSettings() {
      const body = {
        port: $("port").value.trim() || null,
        baudrate: $("baud").value ? parseInt($("baud").value, 10) : null,
        bytesize: $("bytesize").value ? parseInt($("bytesize").value, 10) : null,
        parity: $("parity").value.trim() || null,
        stopbits: $("stopbits").value ? parseInt($("stopbits").value, 10) : null,
        timeout: $("timeout").value ? parseFloat($("timeout").value) : null,
      };
      const r = await fetch("/api/settings/serial", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const t = await r.text();
        throw new Error(t || r.statusText);
      }
    }

    function renderRoutes(state) {
      const tb = $("routeBody");
      tb.innerHTML = "";
      (state.routes || []).forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = "<td>" + escapeHtml(row.output_display) + "</td><td>" + escapeHtml(row.input_display) + "</td>";
        tb.appendChild(tr);
      });
      const at = state.last_checked_at || "—";
      $("routeMeta").textContent = "마지막 조회: " + at + (state.connected ? " · 연결됨" : " · 미연결/오류");
      $("routeErr").textContent = state.last_error || "";
      $("rawPreview").textContent = state.last_raw_preview || "(없음)";
    }

    function escapeHtml(s) {
      if (!s) return "";
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    async function loadRoutes() {
      const r = await fetch("/api/status");
      const j = await r.json();
      renderRoutes(j);
    }

    function showResult(j) {
      const el = $("out");
      const ok = j.ok === true;
      el.className = "out " + (ok ? "ok" : "err");
      const lines = [
        ok ? "✓ 장비로부터 데이터를 받았습니다." : "✗ 응답 없음 또는 오류",
        "",
        "명령: " + (j.command || "") + (j.used_fallback ? " (보조 명령 사용)" : ""),
        "메시지: " + (j.message || ""),
        "",
        "--- raw (텍스트) ---",
        j.raw || "(비어 있음)",
        "",
        "--- raw (hex 앞 256바이트) ---",
        j.raw_bytes_hex || "(없음)",
      ];
      el.textContent = lines.join("\n");
    }

    $("save").addEventListener("click", async () => {
      $("status").textContent = "";
      try {
        await saveSettings();
        $("status").textContent = "설정이 data/config.json 에 저장되었습니다.";
      } catch (e) {
        $("status").textContent = "저장 실패: " + e.message;
      }
    });

    function setSerialUiBusy(busy) {
      ["routeSend", "preset12", "preset22", "connTest"].forEach((id) => {
        const el = $(id);
        if (el) el.disabled = busy;
      });
    }

    async function postRouting(input_no, output_no) {
      await saveSettings();
      const r = await fetch("/api/routing", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input_no, output_no }),
      });
      const text = await r.text();
      let j = {};
      try {
        j = text ? JSON.parse(text) : {};
      } catch {
        throw new Error("응답 파싱 실패: " + text.slice(0, 200));
      }
      if (!r.ok) {
        const d = j.detail !== undefined ? j.detail : j;
        throw new Error("HTTP " + r.status + ": " + (typeof d === "string" ? d : JSON.stringify(d)));
      }
      return j;
    }

    $("connTest").addEventListener("click", async () => {
      $("status").textContent = "";
      $("out").textContent = "전송 중…";
      setSerialUiBusy(true);
      try {
        await saveSettings();
        const r = await fetch("/api/connection/test", { method: "POST" });
        const j = await r.json();
        if (!r.ok) {
          $("out").className = "out err";
          $("out").textContent = "서버 오류: HTTP " + r.status + "\n" + JSON.stringify(j, null, 2);
          $("status").textContent = "연결 테스트 실패";
        } else {
          showResult(j);
          $("status").textContent = j.ok ? "연결 테스트 완료 — 응답 수신" : "응답 없음 또는 Serial 오류";
        }
        await loadRoutes();
      } catch (e) {
        $("out").className = "out err";
        $("out").textContent = "요청 실패: " + e.message;
      } finally {
        setSerialUiBusy(false);
      }
    });

    $("routeSend").addEventListener("click", async () => {
      $("routeSendMsg").textContent = "";
      setSerialUiBusy(true);
      try {
        const input_no = parseInt($("routeIn").value, 10);
        const output_no = parseInt($("routeOut").value, 10);
        const j = await postRouting(input_no, output_no);
        $("routeSendMsg").textContent = "전송 완료: " + (j.command || "") + " — " + (j.message || "");
        if (j.state) renderRoutes(j.state);
      } catch (e) {
        $("routeSendMsg").textContent = "요청 실패: " + e.message;
      } finally {
        setSerialUiBusy(false);
      }
    });

    $("preset12").addEventListener("click", async () => {
      $("routeSendMsg").textContent = "";
      setSerialUiBusy(true);
      try {
        const j = await postRouting(1, 2);
        $("routeIn").value = "1";
        $("routeOut").value = "2";
        $("routeSendMsg").textContent = "테스트 1→2: " + (j.command || "") + " — " + (j.message || "");
        if (j.state) renderRoutes(j.state);
      } catch (e) {
        $("routeSendMsg").textContent = "요청 실패: " + e.message;
      } finally {
        setSerialUiBusy(false);
      }
    });

    $("preset22").addEventListener("click", async () => {
      $("routeSendMsg").textContent = "";
      setSerialUiBusy(true);
      try {
        const j = await postRouting(2, 2);
        $("routeIn").value = "2";
        $("routeOut").value = "2";
        $("routeSendMsg").textContent = "테스트 2→2: " + (j.command || "") + " — " + (j.message || "");
        if (j.state) renderRoutes(j.state);
      } catch (e) {
        $("routeSendMsg").textContent = "요청 실패: " + e.message;
      } finally {
        setSerialUiBusy(false);
      }
    });

    loadSettings()
      .then(loadRoutes)
      .catch((e) => {
        $("status").textContent = "로드 실패: " + e.message;
      });
  </script>
</body>
</html>
